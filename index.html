<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日简报 | Daily Briefing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0A1628;
      color: #CBD5E1;
      min-height: 100vh;
    }
    header {
      padding: 3rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid #1E3A5F;
    }
    header h1 {
      font-size: 2rem;
      color: #FFFFFF;
      margin-bottom: 0.5rem;
    }
    header h1 span { color: #00C2FF; }
    header p {
      font-size: 1rem;
      color: #94A3B8;
    }
    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .card {
      background: #132340;
      border-left: 4px solid #00C2FF;
      border-radius: 4px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h3 { color: #FFFFFF; margin-bottom: 0.5rem; }
    .card p { color: #94A3B8; font-size: 0.9rem; }
    footer {
      text-align: center;
      padding: 2rem;
      color: #64748B;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>每日 <span>AI</span> 简报</h1>
    <p>Daily Tech & AI Briefing — 精选自 50+ 位 AI 领袖、研究者与建造者的动态</p>
  </header>
  <main>
    <div class="card">
      <h3>🚧 站点建设中</h3>
      <p>每日简报网站正在搭建，敬请期待。每日 PDF 简报将在此发布。</p>
    </div>
  </main>
  <footer>
    &copy; 2026 Daily Briefing
  </footer>
</body>
</html>
