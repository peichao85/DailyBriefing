<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日AI简报 | Daily AI Briefing</title>
  <link rel="stylesheet" href="web/css/style.css">
</head>
<body>
  <div x-data="briefingApp()" x-init="init()">

    <!-- Header -->
    <header>
      <a class="github-link" href="https://github.com/peichao85/DailyBriefing" target="_blank" rel="noopener" title="View on GitHub">
        <svg height="20" viewBox="0 0 16 16" width="20" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
        </svg>
        <span>GitHub</span>
      </a>
      <h1>每日<span class="accent">AI简报</span></h1>

      <!-- Tab Bar (top-level: AI / GitHub) -->
      <nav class="tab-bar" x-show="categories.length > 1">
        <template x-for="cat in categories" :key="cat.key">
          <button :class="{ active: cat.key === currentCategory }"
            @click="switchCategory(cat.key)"
            x-text="cat.label"></button>
        </template>
      </nav>

      <p class="subtitle" x-show="subtitle" x-text="subtitle"></p>

      <!-- Date Picker -->
      <div class="date-picker">
        <div class="date-picker-main">
          <button class="arrow" :disabled="!hasPrev" @click="prevDate">&larr;</button>
          <span class="current-date" @click="toggleCalendar" x-text="currentDate || '加载中...'"></span>
          <button class="arrow" :disabled="!hasNext" @click="nextDate">&rarr;</button>

          <!-- Calendar Popup -->
          <template x-if="calendarOpen">
            <div>
              <div class="calendar-overlay" @click="calendarOpen = false"></div>
              <div class="calendar">
                <div class="calendar-header">
                  <button @click="calendarPrevMonth">&larr;</button>
                  <span class="month-label" x-text="calendarMonthLabel"></span>
                  <button @click="calendarNextMonth">&rarr;</button>
                </div>
                <div class="calendar-grid">
                  <template x-for="d in ['日','一','二','三','四','五','六']">
                    <div class="weekday" x-text="d"></div>
                  </template>
                  <template x-for="day in calendarDays" :key="day.key">
                    <div class="day"
                      :class="{
                        empty: !day.num,
                        available: day.available,
                        selected: day.dateStr === currentDate,
                        today: day.isToday
                      }"
                      @click="day.available && selectDate(day.dateStr)"
                      x-text="day.num || ''">
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>
        <a class="pdf-download" x-show="currentDate && showPdfButton"
          :href="'pdf/AI/daily-tech-ai-briefing-' + currentDate + '-cn.pdf'"
          target="_blank" rel="noopener">↓ 下载简报</a>
      </div>
    </header>

    <!-- Day Title (hidden for sectioned briefings where the title is just a redundant label) -->
    <div class="day-title" x-show="briefing && !isSectioned && !isDocument" x-text="briefing?.title || ''"></div>

    <!-- Loading -->
    <div class="loading" x-show="loading">正在加载简报数据...</div>

    <!-- Error -->
    <div class="error-msg" x-show="error" x-text="error"></div>

    <!-- Flat Card Grid (AI category: single items[] array) -->
    <div class="card-grid" x-show="briefing && !loading && !isSectioned && !isDocument">
      <template x-for="(item, idx) in (briefing?.items || [])" :key="item.id">
        <div class="card"
          :class="{
            'card-hero': idx === 0,
            'card-featured': idx === 1 || idx === 2,
            'card-standard': idx > 2,
            expanded: expandedId === item.id,
            faded: expandedId && expandedId !== item.id
          }"
          :style="getCardStyle(item, idx)"
          @click="toggleCard(item.id, $el)">
          <!-- Hero Badge -->
          <template x-if="idx === 0">
            <div class="badge"
              :style="'background:' + getTheme(item).accent + '; color: #fff;'">头条</div>
          </template>

          <!-- Card Header -->
          <div class="card-header">
            <div class="card-icon"
              :style="'background:' + getTheme(item).accent + '22; color:' + getTheme(item).accent + ';'">
              <span x-text="getTheme(item).icon"></span>
            </div>
            <div class="card-header-text">
              <div class="card-title" x-text="item.title"></div>
            </div>
          </div>

          <!-- Logo image: float right when expanded, or when hero (collapsed) -->
          <template x-if="item.image && ((expandedId === item.id && item.image_type !== 'chart') || (expandedId !== item.id && idx === 0))">
            <div class="card-image" :class="{'logo-bg': item.image_type === 'logo'}">
              <img :src="imageSrc(item)"
                :alt="item.title" loading="lazy">
            </div>
          </template>

          <div class="card-source" :style="'color:' + getTheme(item).accent + ';'">
            <span class="source-label">来源: </span><span
              x-text="item.source_name"
              :class="{ 'source-link': item.source_url }"
              :style="'color:' + getTheme(item).accent + ';'"
              @click="if (item.source_url) { $event.stopPropagation(); window.open(item.source_url, '_blank'); }"></span>
          </div>
          <div class="card-summary" x-html="renderMarkdown(item.summary)"></div>
          <div class="card-clear"></div>

          <!-- Image below summary when collapsed (non-hero only) -->
          <template x-if="item.image && expandedId !== item.id && idx !== 0">
            <div class="card-image-block" :class="{'logo-bg': item.image_type === 'logo'}">
              <img :src="imageSrc(item)"
                :alt="item.title" loading="lazy">
            </div>
          </template>

          <!-- Tags -->
          <div class="card-tags" x-show="item.tags && item.tags.length">
            <template x-for="tag in (item.tags || [])">
              <span x-text="tag"
                :style="'background:' + getTheme(item).accent + '18; color:' + getTheme(item).accent + ';'"></span>
            </template>
          </div>

          <!-- Signal -->
          <div class="card-signal" x-show="item.significance"
            :style="'color:' + getTheme(item).accent + 'cc;'">
            <span class="signal-label" :style="'color:' + getTheme(item).accent + ';'">信号 ›</span>
            <span x-html="renderMarkdown(item.significance)"></span>
          </div>

          <!-- Expanded Detail -->
          <div class="card-detail" @click.stop
            :style="'border-top: 1px solid ' + getTheme(item).accent + '33;'">
            <template x-if="item.image && item.image_type === 'chart' && expandedId === item.id">
              <div class="card-detail-chart">
                <img :src="'web/' + currentCategory + '/' + currentDate + '/' + item.image"
                  :alt="item.title" loading="lazy">
              </div>
            </template>
            <div class="detail-section" x-show="item.detail"
              :style="'border-left: 3px solid ' + getTheme(item).accent + '44;'">
              <div class="detail-label" :style="'color:' + getTheme(item).accent + ';'">详细内容</div>
              <div class="detail-text" x-html="renderMarkdown(item.detail)"></div>
            </div>
            <div class="detail-section" x-show="item.key_quotes && item.key_quotes.length"
              :style="'border-left: 3px solid ' + getTheme(item).accent + '44;'">
              <div class="detail-label" :style="'color:' + getTheme(item).accent + ';'">关键引用</div>
              <template x-for="q in (item.key_quotes || [])">
                <blockquote x-html="renderMarkdown(q)" :style="'border-left: 3px solid ' + getTheme(item).accent + ';'"></blockquote>
              </template>
            </div>
            <div class="detail-section" x-show="item.significance"
              :style="'border-left: 3px solid ' + getTheme(item).accent + '44;'">
              <div class="detail-label" :style="'color:' + getTheme(item).accent + ';'">重要性</div>
              <div class="significance-box"
                :style="'background:' + getTheme(item).accent + '0d; color:' + getTheme(item).accent + 'dd;'"
                x-html="renderMarkdown(item.significance)"></div>
            </div>
            <div class="detail-section" x-show="item.links && item.links.length"
              :style="'border-left: 3px solid ' + getTheme(item).accent + '44;'">
              <div class="detail-label" :style="'color:' + getTheme(item).accent + ';'">相关链接</div>
              <ul class="detail-links">
                <template x-for="link in (item.links || [])">
                  <li><a :href="link" target="_blank" rel="noopener"
                    :style="'color:' + getTheme(item).accent + ';'" x-text="link"></a></li>
                </template>
              </ul>
            </div>
            <button class="close-btn" @click.stop="collapseCard()"
              :style="'border-color:' + getTheme(item).accent + '44;'"
              @mouseenter="$el.style.borderColor = getTheme(item).accent; $el.style.color = getTheme(item).accent"
              @mouseleave="$el.style.borderColor = getTheme(item).accent + '44'; $el.style.color = ''">
              ← 收起
            </button>
          </div>
        </div>
      </template>
    </div>

    <!-- Sectioned Grid (GitHub category: briefing.sections with their own items[]) -->
    <div x-show="briefing && !loading && isSectioned">
      <!-- Sub-tab bar -->
      <nav class="section-tabs" x-show="(briefing?.sections || []).length > 1">
        <template x-for="section in (briefing?.sections || [])" :key="section.id">
          <button :class="{ active: section.id === currentSectionId }"
            @click="switchSection(section.id)">
            <span class="section-tab-label" x-text="section.label"></span>
          </button>
        </template>
      </nav>

      <template x-if="currentSection">
        <section class="briefing-section">
          <div class="section-subtitle-line" x-text="currentSection.subtitle"></div>
          <div class="card-grid">
            <template x-for="item in (currentSection.items || [])" :key="item.id">
              <div class="card card-standard"
                :class="{ expanded: expandedId === item.id, faded: expandedId && expandedId !== item.id }"
                :style="getCardStyle(item, 3)"
                @click="toggleCard(item.id, $el)">

                <!-- Card Header with GitHub meta -->
                <div class="card-header">
                  <div class="card-icon card-icon-avatar"
                    :style="'background:' + getTheme(item).accent + '22; color:' + getTheme(item).accent + ';'">
                    <template x-if="item.image">
                      <img :src="imageSrc(item)"
                        :alt="item.owner || item.title" loading="lazy">
                    </template>
                    <template x-if="!item.image">
                      <span x-text="getTheme(item).icon"></span>
                    </template>
                  </div>
                  <div class="card-header-text">
                    <div class="card-source" :style="'color:' + getTheme(item).accent + ';'">
                      <span
                        x-text="item.owner || item.source_name"
                        class="source-link"
                        :style="'color:' + getTheme(item).accent + ';'"
                        @click="if (item.links && item.links.length) { $event.stopPropagation(); window.open(item.links[0], '_blank'); }"></span>
                    </div>
                    <div class="card-meta-github" x-show="item.stars != null">
                      <span x-text="'★ ' + formatStars(item.stars)"></span>
                      <span x-show="item.stars_gained" class="stars-gained"
                        x-text="'+' + formatStars(item.stars_gained) + ' / 7天'"></span>
                      <span x-show="item.language" x-text="item.language"></span>
                    </div>
                  </div>
                </div>

                <div class="card-title" x-text="item.title"></div>
                <div class="card-summary" x-html="renderMarkdown(item.summary)"></div>
                <div class="card-clear"></div>

                <!-- Tags -->
                <div class="card-tags" x-show="item.tags && item.tags.length">
                  <template x-for="tag in (item.tags || [])">
                    <span x-text="tag"
                      :style="'background:' + getTheme(item).accent + '18; color:' + getTheme(item).accent + ';'"></span>
                  </template>
                </div>

                <!-- Signal -->
                <div class="card-signal" x-show="item.significance"
                  :style="'color:' + getTheme(item).accent + 'cc;'">
                  <span class="signal-label" :style="'color:' + getTheme(item).accent + ';'">信号 ›</span>
                  <span x-html="renderMarkdown(item.significance)"></span>
                </div>

                <!-- Expanded Detail -->
                <div class="card-detail" @click.stop
                  :style="'border-top: 1px solid ' + getTheme(item).accent + '33;'">
                  <div class="detail-section" x-show="item.detail"
                    :style="'border-left: 3px solid ' + getTheme(item).accent + '44;'">
                    <div class="detail-label" :style="'color:' + getTheme(item).accent + ';'">详细内容</div>
                    <div class="detail-text" x-html="renderMarkdown(item.detail)"></div>
                  </div>
                  <div class="detail-section" x-show="item.significance"
                    :style="'border-left: 3px solid ' + getTheme(item).accent + '44;'">
                    <div class="detail-label" :style="'color:' + getTheme(item).accent + ';'">重要性</div>
                    <div class="significance-box"
                      :style="'background:' + getTheme(item).accent + '0d; color:' + getTheme(item).accent + 'dd;'"
                      x-html="renderMarkdown(item.significance)"></div>
                  </div>
                  <div class="detail-section" x-show="item.links && item.links.length"
                    :style="'border-left: 3px solid ' + getTheme(item).accent + '44;'">
                    <div class="detail-label" :style="'color:' + getTheme(item).accent + ';'">仓库链接</div>
                    <ul class="detail-links">
                      <template x-for="link in (item.links || [])">
                        <li><a :href="link" target="_blank" rel="noopener"
                          :style="'color:' + getTheme(item).accent + ';'" x-text="link"></a></li>
                      </template>
                    </ul>
                  </div>
                  <button class="close-btn" @click.stop="collapseCard()"
                    :style="'border-color:' + getTheme(item).accent + '44;'"
                    @mouseenter="$el.style.borderColor = getTheme(item).accent; $el.style.color = getTheme(item).accent"
                    @mouseleave="$el.style.borderColor = getTheme(item).accent + '44'; $el.style.color = ''">
                    ← 收起
                  </button>
                </div>
              </div>
            </template>
          </div>
        </section>
      </template>
    </div>

    <!-- Document Report (USStocks 美股复盘: briefing.format === 'document') -->
    <!-- All sections render on one page; a sticky left rail (TOC) tracks scroll. -->
    <div x-show="briefing && !loading && isDocument" class="doc" x-init="initDocScrollSpy()">
      <!-- One-line takeaway banner (full width) -->
      <div class="doc-headline" x-show="briefing?.headline"
        :style="'border-left-color:' + categoryAccent + ';'">
        <span class="doc-headline-label" :style="'background:' + categoryAccent + ';'">今日总结</span>
        <span class="doc-headline-text" x-html="renderMarkdown(briefing?.headline || '')"></span>
      </div>

      <div class="doc-layout">
        <!-- Sticky left table-of-contents -->
        <nav class="doc-nav" x-show="(briefing?.sections || []).length > 1">
          <template x-for="section in (briefing?.sections || [])" :key="section.id">
            <a class="doc-nav-link" :class="{ active: activeDocSection === section.id }"
              @click.prevent="scrollToSection(section.id)"
              :style="activeDocSection === section.id ? 'color:' + categoryAccent + '; border-left-color:' + categoryAccent + '; border-bottom-color:' + categoryAccent + ';' : ''"
              x-text="(section.icon ? section.icon + ' ' : '') + section.label"></a>
          </template>
        </nav>

        <!-- Content: every section stacked -->
        <div class="doc-content">
          <template x-for="section in (briefing?.sections || [])" :key="section.id">
            <section class="doc-section" :data-sec="section.id">
              <h2 class="doc-section-title" :style="'color:' + categoryAccent + ';'"
                x-text="(section.icon ? section.icon + ' ' : '') + section.label"></h2>
              <div class="section-subtitle-line" style="text-align:left;margin-left:0"
                x-show="section.subtitle" x-text="section.subtitle"></div>
              <template x-for="(block, bi) in (section.blocks || [])" :key="bi">
                <div class="doc-block">
                  <!-- heading -->
                  <template x-if="block.type === 'heading'">
                    <h3 class="doc-h" :style="'color:' + categoryAccent + '; border-left-color:' + categoryAccent + ';'"
                      x-text="block.text"></h3>
                  </template>
                  <!-- prose -->
                  <template x-if="block.type === 'prose'">
                    <div class="doc-prose" x-html="renderMarkdown(block.md || '')"></div>
                  </template>
                  <!-- callout -->
                  <template x-if="block.type === 'callout'">
                    <div class="doc-callout" :class="'tone-' + (block.tone || 'info')">
                      <div class="doc-callout-title" x-show="block.title" x-text="block.title"></div>
                      <div class="doc-callout-body" x-html="renderMarkdown(block.md || '')"></div>
                    </div>
                  </template>
                  <!-- table -->
                  <template x-if="block.type === 'table'">
                    <div class="doc-table-wrap">
                      <div class="doc-table-title" x-show="block.title"
                        :style="'color:' + categoryAccent + ';'" x-text="block.title"></div>
                      <table class="doc-table">
                        <thead>
                          <tr>
                            <template x-for="(col, ci) in (block.columns || [])" :key="ci">
                              <th x-text="col"></th>
                            </template>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="(row, ri) in (block.rows || [])" :key="ri">
                            <tr>
                              <template x-for="(cell, ci) in row" :key="ci">
                                <td :class="cellClass(block, ci, cell)" x-html="renderInline(String(cell == null ? '' : cell))"></td>
                              </template>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </template>
                </div>
              </template>
            </section>
          </template>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>&copy; 2026 Daily AI Briefing</footer>
  </div>

  <script src="web/js/alpine.min.js" defer></script>
  <script>
    // Tag → Theme mapping
    const TAG_THEMES = {
      '模型发布': { accent: '#8B5CF6', bg1: '#231c55', icon: '🚀' },
      'Anthropic': { accent: '#8B5CF6', bg1: '#231c55', icon: '🚀' },
      'OpenAI':    { accent: '#8B5CF6', bg1: '#231c55', icon: '🚀' },
      'Cursor':    { accent: '#8B5CF6', bg1: '#231c55', icon: '🚀' },
      'AI编程':    { accent: '#10B981', bg1: '#143525', icon: '⚡' },
      '协作':      { accent: '#10B981', bg1: '#143525', icon: '⚡' },
      '框架':      { accent: '#10B981', bg1: '#143525', icon: '⚡' },
      '行业趋势':  { accent: '#F59E0B', bg1: '#352810', icon: '📊' },
      '热门趋势':  { accent: '#F59E0B', bg1: '#352810', icon: '📊' },
      'AI安全':    { accent: '#EF4444', bg1: '#351818', icon: '🛡️' },
      '治理':      { accent: '#EF4444', bg1: '#351818', icon: '🛡️' },
      '开源':      { accent: '#EC4899', bg1: '#35182a', icon: '🔓' },
      '多模态':    { accent: '#EC4899', bg1: '#35182a', icon: '🔓' },
      '边缘计算':  { accent: '#EC4899', bg1: '#35182a', icon: '🔓' },
      'Agent':     { accent: '#06B6D4', bg1: '#122a38', icon: '🤖' },
      'AI Agent':  { accent: '#06B6D4', bg1: '#122a38', icon: '🤖' },
      'Claude Code': { accent: '#06B6D4', bg1: '#122a38', icon: '🤖' },
      '开发工具':  { accent: '#10B981', bg1: '#143525', icon: '🛠️' },
      '命令行':    { accent: '#10B981', bg1: '#143525', icon: '🛠️' },
      'CLI':       { accent: '#10B981', bg1: '#143525', icon: '🛠️' },
    };

    const DEFAULT_THEME = { accent: '#00C2FF', bg1: '#182a4a', icon: '💡' };

    // Language → Theme mapping (GitHub tab).
    // The five most common languages get the five easy-to-tell-apart primary
    // colors (blue, red, green, purple, yellow) so the page stays legible at
    // a glance. The next five get secondary hues. HTML is markup, not a
    // programming language, so it's neutralized to slate gray. Languages not
    // in this map fall through to DEFAULT_THEME (cyan).
    const LANGUAGE_THEMES = {
      // Top 5 — primary colors
      'Python':           { accent: '#3B82F6', bg1: '#172848' },  // blue
      'TypeScript':       { accent: '#A855F7', bg1: '#281c55' },  // purple
      'JavaScript':       { accent: '#FACC15', bg1: '#352a12' },  // yellow
      'Go':               { accent: '#22C55E', bg1: '#12351e' },  // green
      'Rust':             { accent: '#EF4444', bg1: '#351818' },  // red
      // Next 5 — secondary hues
      'C++':              { accent: '#EC4899', bg1: '#351828' },  // pink
      'Java':             { accent: '#F97316', bg1: '#35200e' },  // orange
      'Jupyter Notebook': { accent: '#14B8A6', bg1: '#122f2c' },  // teal
      'Shell':            { accent: '#84CC16', bg1: '#223512' },  // lime
      'HTML':             { accent: '#94A3B8', bg1: '#222e3e' },  // slate gray (markup)
    };

    const CATEGORY_HEADERS = {
      // Subtitles are intentionally empty across all categories so the date
      // picker sits at the same height when switching tabs (no description gap).
      'AI':       { subtitle: '' },
      // GitHub sub-sections carry their own subtitles, so the category-level one is suppressed.
      'GitHub':   { subtitle: '' },
      // USStocks (美股复盘): document render mode, emerald accent. US color
      // convention — green = up, red = down — drives the table +/- coloring.
      'USStocks': { subtitle: '', accent: '#34D399' },
    };

    function briefingApp() {
      return {
        // State
        manifest: null,
        categories: [],           // [{key, label}, ...] from manifest
        currentCategory: 'AI',    // active tab key
        categoryState: {},        // cached {dates, currentIndex, currentDate, briefing} per category
        dates: [],
        currentIndex: 0,
        currentDate: null,
        briefing: null,
        loading: true,
        error: null,
        expandedId: null,
        currentSectionId: null,
        activeDocSection: null,   // document-mode scrollspy: id of section in view
        _docSpyBound: false,
        calendarOpen: false,
        calendarYear: null,
        calendarMonth: null,

        // Theme helpers
        getTheme(item) {
          // GitHub tab (sectioned briefings): theme by primary language.
          // Unmapped/null languages fall through to DEFAULT_THEME.
          if (this.isSectioned) {
            const langTheme = LANGUAGE_THEMES[item.language];
            return langTheme ? { ...DEFAULT_THEME, ...langTheme } : DEFAULT_THEME;
          }
          // AI tab: theme by first matching tag.
          if (!item.tags || !item.tags.length) return DEFAULT_THEME;
          for (const tag of item.tags) {
            if (TAG_THEMES[tag]) return TAG_THEMES[tag];
          }
          return DEFAULT_THEME;
        },

        getCardStyle(item, idx) {
          const theme = this.getTheme(item);
          const delay = (idx || 0) * 0.07;
          const shadow = theme.accent + '25';
          return `border-left-color: ${theme.accent}; `
            + `background: linear-gradient(135deg, ${theme.bg1}, #1e3255); `
            + `box-shadow: 0 4px 20px ${shadow}, 0 2px 0 rgba(0,0,0,0.5); `
            + `animation-delay: ${delay}s;`;
        },

        formatStars(n) {
          if (n == null) return '';
          if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
          return String(n);
        },

        renderMarkdown(text) {
          if (!text) return '';
          text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

          const blocks = text.split(/\n\s*\n/);
          return blocks.map(block => {
            block = block.trim();
            if (!block) return '';

            const lines = block.split('\n');
            const isList = lines.every(l => l.trim() === '' || l.trim().startsWith('- '));

            if (isList && lines.some(l => l.trim().startsWith('- '))) {
              const items = lines
                .filter(l => l.trim().startsWith('- '))
                .map(l => '<li>' + this.renderInline(l.trim().substring(2)) + '</li>');
              return '<ul>' + items.join('') + '</ul>';
            }

            return '<p>' + this.renderInline(block) + '</p>';
          }).join('');
        },

        renderInline(text) {
          return text
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br>');
        },

        imageSrc(item) {
          if (!item.image) return '';
          if (item.image.startsWith('assets/')) {
            return 'web/' + item.image;
          }
          return 'web/' + this.currentCategory + '/' + this.currentDate + '/' + item.image;
        },

        // Computed
        get hasPrev() { return this.currentIndex < this.dates.length - 1; },
        get hasNext() { return this.currentIndex > 0; },
        // Document mode (美股复盘): a section[].blocks[] report with tables/prose.
        get isDocument() { return (this.briefing?.format === 'document'); },
        // GitHub-style sectioned cards — distinct from document mode, which also
        // uses a `sections` array but renders blocks, not item cards.
        get isSectioned() { return !this.isDocument && !!(this.briefing && this.briefing.sections); },
        get categoryAccent() {
          return (CATEGORY_HEADERS[this.currentCategory] || {}).accent || DEFAULT_THEME.accent;
        },
        // Color a +/- numeric cell (US convention: green up, red down).
        cellClass(block, colIdx, cell) {
          if (!block.posneg || !block.posneg.includes(colIdx)) return '';
          const s = String(cell == null ? '' : cell).trim();
          if (!s || s === '—' || s === '-' || s.indexOf('暂无') !== -1) return '';
          const num = parseFloat(s.replace(/[^0-9.+-]/g, ''));
          if (isNaN(num) || num === 0) return '';
          return num > 0 ? 'cell-pos' : 'cell-neg';
        },
        get currentSection() {
          const s = this.briefing?.sections;
          if (!s || !s.length) return null;
          return s.find(x => x.id === this.currentSectionId) || s[0];
        },
        get showPdfButton() { return this.currentCategory === 'AI'; },
        get subtitle() { return (CATEGORY_HEADERS[this.currentCategory] || CATEGORY_HEADERS.AI).subtitle; },
        get calendarMonthLabel() {
          if (this.calendarYear == null) return '';
          const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
          return this.calendarYear + '年 ' + months[this.calendarMonth];
        },
        get calendarDays() {
          if (this.calendarYear == null) return [];
          const year = this.calendarYear;
          const month = this.calendarMonth;
          const firstDay = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const today = new Date();
          const todayStr = this.formatDate(today);
          const days = [];
          for (let i = 0; i < firstDay; i++) {
            days.push({ key: 'e' + i, num: null });
          }
          for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = this.formatDate(new Date(year, month, d));
            days.push({
              key: dateStr, num: d, dateStr,
              available: this.dates.includes(dateStr),
              isToday: dateStr === todayStr
            });
          }
          return days;
        },

        // Methods
        async init() {
          try {
            const resp = await fetch('web/manifest.json');
            if (!resp.ok) throw new Error('无法加载数据清单');
            this.manifest = await resp.json();
            const cats = this.manifest.categories || {};
            // GitHub/US-Stocks briefings are paused; hide their tabs without touching
            // the underlying data. Add 'GitHub' / 'USStocks' back here to restore.
            const visibleCategoryKeys = ['AI'];
            this.categories = Object.entries(cats)
              .filter(([key]) => visibleCategoryKeys.includes(key))
              .map(([key, val]) => ({
                key,
                label: val.label || key,
              }));
            if (!this.categories.length) {
              this.loading = false;
              this.error = '暂无可用的简报数据';
              return;
            }
            // Initial category from URL hash (#ai → AI, #github → GitHub), default to first
            const initialKey = this.categoryFromHash() || this.categories[0].key;
            await this.switchCategory(initialKey, { skipHash: true });
            window.addEventListener('hashchange', () => {
              const k = this.categoryFromHash();
              if (k && k !== this.currentCategory) {
                this.switchCategory(k, { skipHash: true });
              }
            });
          } catch (e) {
            this.loading = false;
            this.error = e.message || '加载失败';
          }
        },

        categoryFromHash() {
          const h = (location.hash || '').replace(/^#/, '').toLowerCase();
          if (!h) return null;
          return this.categories.find(c => c.key.toLowerCase() === h)?.key || null;
        },

        async switchCategory(key, opts = {}) {
          if (!this.categories.find(c => c.key === key)) return;
          // Snapshot current state
          if (this.currentCategory) {
            this.categoryState[this.currentCategory] = {
              dates: this.dates,
              currentIndex: this.currentIndex,
              currentDate: this.currentDate,
              briefing: this.briefing,
              calendarYear: this.calendarYear,
              calendarMonth: this.calendarMonth,
            };
          }
          this.currentCategory = key;
          this.expandedId = null;
          this.calendarOpen = false;

          const cached = this.categoryState[key];
          if (cached && cached.briefing) {
            // Restore from cache
            this.dates = cached.dates;
            this.currentIndex = cached.currentIndex;
            this.currentDate = cached.currentDate;
            this.briefing = cached.briefing;
            this.calendarYear = cached.calendarYear;
            this.calendarMonth = cached.calendarMonth;
            this.loading = false;
            this.error = null;
          } else {
            // Initialize from manifest
            const catData = this.manifest.categories?.[key];
            if (!catData || !catData.dates || !catData.dates.length) {
              this.dates = [];
              this.currentIndex = 0;
              this.currentDate = null;
              this.briefing = null;
              this.loading = false;
              this.error = '暂无可用的简报数据';
              if (!opts.skipHash) location.hash = '#' + key.toLowerCase();
              return;
            }
            this.dates = [...catData.dates].sort().reverse();
            this.currentIndex = 0;
            this.currentDate = this.dates[0];
            const d = this.parseDate(this.currentDate);
            this.calendarYear = d.getFullYear();
            this.calendarMonth = d.getMonth();
            await this.loadBriefing();
          }

          if (!opts.skipHash) {
            const target = '#' + key.toLowerCase();
            if (location.hash !== target) location.hash = target;
          }
        },

        async loadBriefing() {
          this.loading = true;
          this.error = null;
          this.expandedId = null;
          try {
            const resp = await fetch('web/' + this.currentCategory + '/' + this.currentDate + '/data.json');
            if (!resp.ok) throw new Error('无法加载 ' + this.currentDate + ' 的简报');
            this.briefing = await resp.json();
            // Sub-section: preserve current ID if still present, else default to first
            const sections = this.briefing?.sections || [];
            if (sections.length) {
              const keep = sections.some(s => s.id === this.currentSectionId);
              if (!keep) this.currentSectionId = sections[0].id;
              // Document mode: reset scrollspy to the first section on (re)load.
              this.activeDocSection = sections[0].id;
            } else {
              this.currentSectionId = null;
              this.activeDocSection = null;
            }
          } catch (e) {
            this.briefing = null;
            this.error = e.message || '加载失败';
          }
          this.loading = false;
        },

        switchSection(id) {
          if (this.currentSectionId === id) return;
          this.currentSectionId = id;
          this.expandedId = null;
        },

        // Document mode: scrollspy + click-to-jump for the sticky left TOC.
        initDocScrollSpy() {
          if (this._docSpyBound) return;
          this._docSpyBound = true;
          const update = () => {
            if (!this.isDocument) return;
            const secs = document.querySelectorAll('.doc-section[data-sec]');
            if (!secs.length) return;
            const offset = 120;  // header is not sticky; small top margin
            let current = secs[0].getAttribute('data-sec');
            secs.forEach(s => {
              if (s.getBoundingClientRect().top - offset <= 0) {
                current = s.getAttribute('data-sec');
              }
            });
            // At the very bottom, force the last section active.
            if (window.innerHeight + window.scrollY >= document.body.scrollHeight - 4) {
              current = secs[secs.length - 1].getAttribute('data-sec');
            }
            if (current && current !== this.activeDocSection) this.activeDocSection = current;
          };
          let ticking = false;
          window.addEventListener('scroll', () => {
            if (ticking) return;
            ticking = true;
            requestAnimationFrame(() => { update(); ticking = false; });
          }, { passive: true });
          this.$nextTick(update);
        },

        scrollToSection(id) {
          const el = document.querySelector('.doc-section[data-sec="' + id + '"]');
          if (!el) return;
          this.activeDocSection = id;
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        },

        prevDate() {
          if (!this.hasPrev) return;
          this.currentIndex++;
          this.currentDate = this.dates[this.currentIndex];
          this.loadBriefing();
        },

        nextDate() {
          if (!this.hasNext) return;
          this.currentIndex--;
          this.currentDate = this.dates[this.currentIndex];
          this.loadBriefing();
        },

        selectDate(dateStr) {
          const idx = this.dates.indexOf(dateStr);
          if (idx === -1) return;
          this.currentIndex = idx;
          this.currentDate = dateStr;
          this.calendarOpen = false;
          this.loadBriefing();
        },

        toggleCalendar() {
          this.calendarOpen = !this.calendarOpen;
          if (this.calendarOpen && this.currentDate) {
            const d = this.parseDate(this.currentDate);
            this.calendarYear = d.getFullYear();
            this.calendarMonth = d.getMonth();
          }
        },

        calendarPrevMonth() {
          this.calendarMonth--;
          if (this.calendarMonth < 0) { this.calendarMonth = 11; this.calendarYear--; }
        },

        calendarNextMonth() {
          this.calendarMonth++;
          if (this.calendarMonth > 11) { this.calendarMonth = 0; this.calendarYear++; }
        },

        toggleCard(id, el) {
          if (this.expandedId === id) {
            this.expandedId = null;
          } else {
            this.expandedId = id;
            this.$nextTick(() => {
              el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
          }
        },

        collapseCard() { this.expandedId = null; },

        formatDate(d) {
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return y + '-' + m + '-' + day;
        },

        parseDate(str) {
          const [y, m, d] = str.split('-').map(Number);
          return new Date(y, m - 1, d);
        }
      };
    }
  </script>
</body>
</html>
